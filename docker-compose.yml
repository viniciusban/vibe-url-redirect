services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: steerer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  steerer:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_NAME: steerer_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: "5432"
    volumes:
      - ./src:/app/src
    command: ["uv", "run", "uvicorn", "steerer.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
